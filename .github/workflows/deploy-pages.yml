name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trickcal-tier-list/package-lock.json

      - name: Install frontend dependencies
        working-directory: trickcal-tier-list
        run: npm ci

      - name: Format frontend files
        working-directory: trickcal-tier-list
        run: npm run format

      - name: Build GitHub Pages publish files
        working-directory: trickcal-tier-list
        run: npm run pages:build

      - name: Stage Pages artifact
        run: |
          mkdir -p /tmp/pages-artifact
          rsync -av \
            --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'trickcal-tier-list/node_modules/' \
            --exclude 'trickcal-tier-list/dist/' \
            --exclude 'trickcal-tier-list/backend/.aws-sam/' \
            ./ /tmp/pages-artifact/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages-artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
