AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Discord OAuth backend for the Trickcal Tier List GitHub Pages app.

Parameters:
  DiscordClientId:
    Type: String
  DiscordClientSecret:
    Type: String
    NoEcho: true
  FrontendUrl:
    Type: String
    Description: Full GitHub Pages URL, for example https://stripedypaper.github.io/trickcal-tier-list/
  FrontendOrigin:
    Type: String
    Description: GitHub Pages origin only, for example https://stripedypaper.github.io
  LocalFrontendOrigin:
    Type: String
    Default: http://localhost:8000
    Description: Local development origin allowed for OAuth testing.
  CookieSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Random signing secret for session cookies.

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 128

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: discordId
          AttributeType: S
      KeySchema:
        - AttributeName: discordId
          KeyType: HASH

  CharactersTableV2:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: S
        - AttributeName: position
          AttributeType: S
        - AttributeName: personality
          AttributeType: S
        - AttributeName: nameEnLower
          AttributeType: S
        - AttributeName: nameJaLower
          AttributeType: S
        - AttributeName: nameZhLower
          AttributeType: S
        - AttributeName: nameKoLower
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CharactersByUpdatedAtIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CharactersByPositionIndex
          KeySchema:
            - AttributeName: position
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CharactersByPersonalityIndex
          KeySchema:
            - AttributeName: personality
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CharactersByNameEnIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: nameEnLower
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CharactersByNameJaIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: nameJaLower
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CharactersByNameZhIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: nameZhLower
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CharactersByNameKoIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: nameKoLower
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  RankingSubmissionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  UserCharacterScoresTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: characterId
          AttributeType: S
        - AttributeName: submittedAt
          AttributeType: S
        - AttributeName: favoriteCharacterId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: characterId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ScoresByCharacterSubmittedAtIndex
          KeySchema:
            - AttributeName: characterId
              KeyType: HASH
            - AttributeName: submittedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: FavoritesByCharacterIndex
          KeySchema:
            - AttributeName: favoriteCharacterId
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY

  CommunityCharacterStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: characterId
          AttributeType: S
        - AttributeName: statsType
          AttributeType: S
        - AttributeName: favoriteCount
          AttributeType: N
      KeySchema:
        - AttributeName: characterId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StatsByFavoriteCountIndex
          KeySchema:
            - AttributeName: statsType
              KeyType: HASH
            - AttributeName: favoriteCount
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  CharactersImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref FrontendOrigin
              - !Ref LocalFrontendOrigin
            AllowedMethods:
              - GET
              - HEAD
              - PUT
            AllowedHeaders:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 3600

  CharactersImagesOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-characters-images-oac'
        Description: Origin access control for character images
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CharactersImagesCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-characters-images-cache-policy'
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true

  CharactersImagesDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100
        DefaultRootObject: ''
        Origins:
          - Id: CharactersImagesOrigin
            DomainName: !GetAtt CharactersImagesBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref CharactersImagesOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: CharactersImagesOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref CharactersImagesCachePolicy
          Compress: true
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        HttpVersion: http2
        Comment: Character image CDN
        Restrictions:
          GeoRestriction:
            RestrictionType: none

  CharactersImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CharactersImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub '${CharactersImagesBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CharactersImagesDistribution}'

  AuthApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
          - !Ref LocalFrontendOrigin
        AllowHeaders:
          - content-type
        AllowMethods:
          - GET
          - POST
          - PUT
          - OPTIONS
        AllowCredentials: true

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: oauth.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersTableV2
        - DynamoDBCrudPolicy:
            TableName: !Ref RankingSubmissionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserCharacterScoresTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CommunityCharacterStatsTable
        - S3CrudPolicy:
            BucketName: !Ref CharactersImagesBucket
      Environment:
        Variables:
          DISCORD_CLIENT_ID: !Ref DiscordClientId
          DISCORD_CLIENT_SECRET: !Ref DiscordClientSecret
          FRONTEND_URL: !Ref FrontendUrl
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          LOCAL_FRONTEND_ORIGIN: !Ref LocalFrontendOrigin
          COOKIE_SECRET: !Ref CookieSecret
          USERS_TABLE_NAME: !Ref UsersTable
          CHARACTERS_TABLE_NAME: !Ref CharactersTableV2
          RANKING_SUBMISSIONS_TABLE_NAME: !Ref RankingSubmissionsTable
          USER_CHARACTER_SCORES_TABLE_NAME: !Ref UserCharacterScoresTable
          COMMUNITY_CHARACTER_STATS_TABLE_NAME: !Ref CommunityCharacterStatsTable
          CHARACTERS_IMAGES_BUCKET_NAME: !Ref CharactersImagesBucket
          CHARACTERS_CDN_BASE_URL: !Sub 'https://${CharactersImagesDistribution.DomainName}'
      Events:
        Start:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /auth/start
            Method: GET
        Callback:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /auth/callback
            Method: GET
        Me:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /auth/me
            Method: GET
        GetMyRankings:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /rankings/me
            Method: GET
        PutMyRankings:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /rankings/me
            Method: PUT
        GetSharedRankings:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /rankings/{userId}
            Method: GET
        GetCommunityCharacters:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /community/characters
            Method: GET
        GetCommunityFavorites:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /community/favorites
            Method: GET
        TriggerCommunityRebuild:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /community/rebuild
            Method: POST
        Logout:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /auth/logout
            Method: POST
        ListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /admin/users
            Method: GET
        RebuildCommunity:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /admin/community/rebuild
            Method: POST
        ListCharacters:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /admin/characters
            Method: GET
        CreateCharacter:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /admin/characters
            Method: POST
        UpdateCharacter:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /admin/characters/{id}
            Method: PUT
        CharacterImageUpload:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /admin/characters/{id}/image-upload
            Method: POST

Outputs:
  ApiBaseUrl:
    Description: Use this value as window.TRICKCAL_CONFIG.apiBaseUrl.
    Value: !Sub 'https://${AuthApi}.execute-api.${AWS::Region}.amazonaws.com'
  DiscordRedirectUri:
    Description: Add this exact URL to the Discord application OAuth2 redirect URLs.
    Value: !Sub 'https://${AuthApi}.execute-api.${AWS::Region}.amazonaws.com/auth/callback'
  UsersTableName:
    Description: Store Discord user records here.
    Value: !Ref UsersTable
  CharactersTableName:
    Description: Store character records here.
    Value: !Ref CharactersTableV2
  RankingSubmissionsTableName:
    Description: Store raw ranking submissions here.
    Value: !Ref RankingSubmissionsTable
  UserCharacterScoresTableName:
    Description: Store per-user derived character scores here.
    Value: !Ref UserCharacterScoresTable
  CommunityCharacterStatsTableName:
    Description: Store materialized community character statistics here.
    Value: !Ref CommunityCharacterStatsTable
  CharactersCdnBaseUrl:
    Description: Use this value as the base URL for character images.
    Value: !Sub 'https://${CharactersImagesDistribution.DomainName}'
